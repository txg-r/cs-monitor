services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cs_monitor
      POSTGRES_USER: cs_monitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs_monitor -d cs_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://cs_monitor:${POSTGRES_PASSWORD:-change-me}@db:5432/cs_monitor
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
