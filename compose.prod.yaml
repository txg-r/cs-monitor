services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cs_monitor
      POSTGRES_USER: cs_monitor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs_monitor -d cs_monitor"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    env_file:
      - path: .env
        required: true
    environment:
      # 生产环境固定走 Compose 内部 Postgres，避免 .env 中误留本地 SQLite 配置。
      DATABASE_URL: postgresql+psycopg://cs_monitor:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/cs_monitor
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  postgres_data:

